; PHP ini overrides for running PHPUnit without ext-sodium.
;
; The tests/sodium_memzero_polyfill.php file is prepended to every PHP script
; so that the no-op sodium_memzero() is defined before Composer's autoloader
; loads paragonie/sodium_compat, which would otherwise throw SodiumException
; when sodium_memzero() is called without the native extension.
;
; Usage: /path/to/php -c phpunit.ini vendor/bin/phpunit
;   or:  php -d auto_prepend_file=tests/sodium_memzero_polyfill.php vendor/bin/phpunit
auto_prepend_file = tests/sodium_memzero_polyfill.php
